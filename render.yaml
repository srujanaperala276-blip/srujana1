services:
  # Backend Web Service
  - type: web
    name: chatbot-api
    runtime: node
    plan: free
    buildCommand: npm install && cd ../server && npm install
    startCommand: node server/index.js
    envVars:
      - key: GROQ_API_KEY
        sync: false # User needs to set this in Render dashboard
      - key: PORT
        value: 5000

  # Frontend Static Site
  - type: static
    name: chatbot-frontend
    runtime: static
    buildCommand: cd client && npm install && npm run build
    publishPath: client/dist
    envVars:
      - key: VITE_API_URL
        value: https://chatbot-api.onrender.com/api/chat # Assuming this name
